apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: document-platform

  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/Swayanshu-Swain/document-platform.git

    targetRevision: main

    path: helm/document-platform

  destination:

    server: https://kubernetes.default.svc

    namespace: default

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
