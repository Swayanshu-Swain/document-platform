name: Deploy Backend

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths-ignore:
          - 'helm/document-platform/values.yaml'

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: swayanshuswain/document-platform-backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV


      - name: Build image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:production \
            backend


      - name: Push image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:production

      - name: Update Helm image tag
        run: |
          sed -i \
            "s/tag: .*/tag: ${IMAGE_TAG}/" \
            helm/document-platform/values.yaml

      - name: Configure Git Authentication
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit Helm changes
        run: |

          git config user.name "github-actions"

          git config user.email "actions@github.com"

          git add helm/document-platform/values.yaml

          git diff --cached --quiet || \
            git commit -m "Deploy ${IMAGE_TAG}"

          git push

