apiVersion: apps/v1
kind: Deployment

metadata:
  name: document-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: document-platform

  template:

    metadata:
      labels:
        app: document-platform

    spec:

      containers:

      - name: document-platform

        image: swayanshuswain/document-platform-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000

        env:

        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_ACCESS_KEY_ID

        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: AWS_SECRET_ACCESS_KEY

        envFrom:

        - configMapRef:
            name: document-platform-config

        - secretRef:
            name: document-platform-secret
