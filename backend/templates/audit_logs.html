<!DOCTYPE html>
<html>
<head>
    <title>Audit Logs</title>
</head>
<body>

<h2>Audit Logs</h2>

<a href="/dashboard">Dashboard</a>

|

<a href="/users">Users</a>

<hr>

<table border="1">

<tr>
    <th>Timestamp</th>
    <th>User</th>
    <th>Action</th>
    <th>Details</th>
</tr>

{% for log in logs %}

<tr>

<td>{{ log.timestamp }}</td>

<td>{{ log.username }}</td>

<td>{{ log.action }}</td>

<td>{{ log.details }}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
