<!DOCTYPE html>
<html>
<head>
    <title>Create User</title>
</head>
<body>

<h2>Create User</h2>

<form method="POST">

    <label>Username</label>
    <br>
    <input
        type="text"
        name="username"
        required
    >

    <br><br>

    <label>Password</label>
    <br>
    <input
        type="password"
        name="password"
        required
    >

    <br><br>

    <label>Role</label>
    <br>

    <select name="role">

        <option value="admin">
            Admin
        </option>

        <option value="development">
            Development
        </option>

        <option value="operations">
            Operations
        </option>

        <option value="client">
            Client
        </option>

    </select>

    <br><br>

    <button type="submit">
        Create User
    </button>

</form>

<br>

<a href="/users">
    Back
</a>

</body>
</html>
