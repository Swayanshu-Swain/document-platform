<!DOCTYPE html>
<html>

<head>
    <title>
        Reset Password
    </title>
</head>

<body>

<h2>
    Reset Password
</h2>

<p>
    User:
    {{ username }}
</p>

<form method="POST">

    <input
        type="password"
        name="password"
        placeholder="New Password"
        required
    >

    <button type="submit">
        Reset Password
    </button>

</form>

<br>

<a href="/users">
    Back
</a>

</body>
</html>
