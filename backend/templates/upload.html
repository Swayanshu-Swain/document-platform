<!DOCTYPE html>
<html>

<head>
    <title>Upload File</title>
</head>

<body>

    <h2>Upload File</h2>

    <form
        method="POST"
        enctype="multipart/form-data"
    >

        <input
            type="file"
            name="file"
            required
        >

        <br><br>

        <button type="submit">
            Upload
        </button>

    </form>

    <br>

    <a href="/dashboard">
        Back To Dashboard
    </a>

</body>

</html>
